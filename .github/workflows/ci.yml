name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: install dependencies
        run: pnpm install --frozen-lockfile

      - name: generate prisma client
        run: pnpm --filter @corvus/api db:generate

      - name: typecheck api
        run: pnpm --filter @corvus/api exec tsc --noEmit

      - name: typecheck web
        run: pnpm --filter @corvus/web exec tsc --noEmit

      - name: lint
        run: pnpm lint
