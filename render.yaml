services:
  - type: web
    name: veyra-api
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: |
      corepack enable
      pnpm install --frozen-lockfile --prod=false
      pnpm --filter @corvus/api db:generate
      pnpm --filter @corvus/api db:push
      pnpm --filter @corvus/api build
    startCommand: pnpm --filter @corvus/api start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          name: veyra-web
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: CORS_ORIGINS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: Veyra <noreply@veyra.app>
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
    buildFilter:
      paths:
        - apps/api/**
        - packages/db/**
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml

  - type: web
    name: veyra-web
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: |
      corepack enable
      pnpm install --frozen-lockfile --prod=false
      pnpm --filter @corvus/web build
    startCommand: pnpm --filter @corvus/web start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: veyra-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_WS_URL
        sync: false
    buildFilter:
      paths:
        - apps/web/**
        - packages/ui/**
        - packages/config/**
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
